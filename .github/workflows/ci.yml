name: CI
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  # Fast path: the deterministic simulation engines need no database and no
  # secrets. This job proves the whole sim/ + lab/ layer stays green on its own.
  engines:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:sim

  # Guards a real regression class: a `next build` must never require a live
  # database. Deliberately runs with NO postgres service and NO DATABASE_URL —
  # any API route that isn't correctly marked `dynamic` and gets statically
  # executed at build time will fail here exactly as it would on a fresh
  # deploy target before the database is reachable.
  build:
    runs-on: ubuntu-latest
    env:
      # A syntactically valid but unreachable placeholder. The postgres.js
      # driver connects lazily on first query, so this satisfies the module's
      # "DATABASE_URL is required" guard without ever opening a socket during
      # the build — exactly like a fresh deploy target before a DB is wired up.
      DATABASE_URL: postgresql://build:build@localhost:5432/build_placeholder
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: opendiscover_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/opendiscover_test
      NEXTAUTH_SECRET: ci-secret-not-real
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint            # biome check . (lint + format)

      - run: pnpm typecheck       # tsc --noEmit

      - run: pnpm db:push --force # apply schema to test DB via drizzle-kit push

      - run: pnpm test            # vitest run
